########## Logger configuration ##########
[logger]
print_level = "DEBUG"      # Console log level: DEBUG, INFO, WARNING, ERROR, CRITICAL

########## Dataset configuration ##########
[dataset]
type = "spider2-lite"
split = ""
root_path = "data/spider2-lite"
save_path = "workspace/dataset/spider2-lite/spider2-lite.pkl"

# Spider2 cloud database credentials
snowflake_credential_path = "snowflake_credential.json"
bigquery_credential_path = "bigquery_credential.json"

max_value_example_length = 50

########## Vector database configuration ##########
[vector_database]
api_type = "openai"
embedding_model_name_or_path = "Qwen3-Embedding-0.6B"
base_url = "https://api.deepseek.com/v1"
api_key = "sk-b456c176ea344713bf485b1814eb1092"
store_root_path = "workspace/vector_database/spider2-lite"
max_value_length = 50
lower_meta_data = true
batch_size = 512
n_parallel = 8

########## Value retrieval configuration ##########
[value_retrieval]
n_results = 5
n_parallel = 16
save_path = "workspace/value_retrieval/spider2-lite/spider2-lite.pkl"

[value_retrieval.llm]
model = "deepseek-reasoner"
base_url = "https://api.deepseek.com/v1"
api_key = "sk-b456c176ea344713bf485b1814eb1092"
max_tokens = 16384
max_request_n = 1
temperature = 0.0
api_type = "openai"

########## Schema linking configuration ##########
[schema_linking]
n_parallel = 16
save_path = "workspace/schema_linking/spider2-lite/spider2-lite.pkl"
direct_linking_sampling_budget = 1
reversed_linking_sampling_budget = 1
value_distance_threshold = 0.02

[schema_linking.llm]
model = "deepseek-reasoner"
base_url = "https://api.deepseek.com/v1"
api_key = "sk-b456c176ea344713bf485b1814eb1092"
max_tokens = 16384
max_request_n = 1
temperature = 0.0
api_type = "openai"
max_model_len = 131072

########## SQL generation configuration ##########
[sql_generation]
n_parallel = 16
save_path = "workspace/sql_generation/spider2-lite/spider2-lite.pkl"
dc_sampling_budget = 1
skeleton_sampling_budget = 1
icl_sampling_budget = 0
# Note: Spider2 may need different few-shot examples, but we don't have them for Spider2
# icl_few_shot_examples_path = "data/spider2-lite/few_shots.json"

[sql_generation.llm]
model = "deepseek-reasoner"
base_url = "https://api.deepseek.com/v1"
api_key = "sk-b456c176ea344713bf485b1814eb1092"
max_tokens = 16384
max_request_n = 1
temperature = 0.0
api_type = "openai"
max_model_len = 131072

########## SQL revision configuration ##########
[sql_revision]
n_parallel = 16
save_path = "workspace/sql_revision/spider2-lite/spider2-lite.pkl"
checker_sampling_budget = 1
checkers = ["ResultChecker"]

[sql_revision.llm]
model = "deepseek-reasoner"
base_url = "https://api.deepseek.com/v1"
api_key = "sk-b456c176ea344713bf485b1814eb1092"
max_tokens = 16384
max_request_n = 1
temperature = 0.0
api_type = "openai"
max_model_len = 131072

########## SQL selection configuration ##########
[sql_selection]
n_parallel = 16
save_path = "workspace/sql_selection/spider2-lite/spider2-lite.pkl"
filter_top_k_sql = 2
evaluator_sampling_budget = 1
shortcut_consistency_score_threshold = 0.6

[sql_selection.llm]
model = "deepseek-reasoner"
base_url = "https://api.deepseek.com/v1"
api_key = "sk-b456c176ea344713bf485b1814eb1092"
max_tokens = 16384
max_request_n = 1
temperature = 0.0
api_type = "openai"
max_model_len = 131072

[llm_extractor]
max_retry = 5